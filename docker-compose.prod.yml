services:
  studio:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '80:8080'
    read_only: true
    tmpfs:
      - /tmp
      - /run
    cap_drop:
      - ALL
    security_opt:
      - 'no-new-privileges:true'
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 128M
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8080/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
